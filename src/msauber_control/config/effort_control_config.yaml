# ros2_control configuration used by GazeboSimSystem plugin
---
controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 200

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_group_effort_controller:
      type: effort_controllers/JointGroupEffortController

    steering_position_controller:
      type: position_controllers/JointGroupPositionController

wheel_group_effort_controller:
  ros__parameters:
    joints:
    - sauber_left_rear_wheel_joint
    - sauber_right_rear_wheel_joint
    command_interfaces:
    - effort
    state_interfaces:
    - position
    - velocity
    - effort

steering_position_controller:
  ros__parameters:
    joints:
    - sauber_left_steering_hinge_joint
    - sauber_right_steering_hinge_joint
    command_interfaces:
    - position
    state_interfaces:
    - position
    - velocity
    - effort
