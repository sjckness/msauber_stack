---
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: [ "GridBased" ]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.25
      allow_unknown: true
      max_iterations: 500000 # generous but finite cap
      max_planning_time: 3.0 # faster failover if unreachable
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 64 # finer than default for smoother headings
      minimum_turning_radius: 0.21 # wheelbase 0.325 m, delta_max 1.0 rad -> ~0.21 m
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      goal_heading_mode: "DEFAULT"
      smooth_path: true

      smoother:
        max_iterations: 400
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1e-6
        do_refinement: true
        refinement_num: 1

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: sauber_base_link
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: [ "static_layer", "inflation_layer" ]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.7
      always_send_full_costmap: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    enable_stamped_cmd_vel: False
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]

    controller_plugins: [ "FollowPath" ]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      use_velocity_scaled_lookahead_dist: true

      desired_linear_vel: 1.0
      min_linear_vel: 0.2

      lookahead_dist: 1.2
      min_lookahead_dist: 0.8
      max_lookahead_dist: 2.0

      max_angular_accel: 2.0

      AckermannConstraints:
        min_turning_r: 0.2
        
      critics: [
        "RotateToGoal",
        "ObstacleFootprint",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      use_rotate_to_heading: false

      regulate_linear_velocity: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: sauber_base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.22
      always_send_full_costmap: True
      plugins: [ "obstacle_layer", "inflation_layer" ]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          obstacle_max_range: 8.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.7

behavior_server:
  ros__parameters:
    use_sim_time: True
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame: map
    robot_base_frame: sauber_base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: sauber_base_link
    odom_topic: /msauber/ackermann_steering_controller/odom
    default_nav_to_pose_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_goal_patience_and_recovery.xml
    default_nav_through_poses_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
